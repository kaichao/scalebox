name: max-sleep-count.test
cluster: ${CLUSTER}
parameters:
  initial_status: RUNNING

jobs:
  agent:
    base_image: hub.cstcloud.cn/scalebox/agent
    arguments:
      sleep_interval_seconds: 12
      max_sleep_count: 10
      slot_options: slot_on_head,reserved_on_exit
    parameters:
      start_message: first_message
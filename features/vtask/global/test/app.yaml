name: global-vtask.test
cluster: ${CLUSTER}
parameters:
  initial_status: RUNNING

jobs:
  global-vtask:
    base_image: hub.cstcloud.cn/scalebox/agent
    arguments:
      slot_options: slot_on_head
      code_path: ${PWD}/../code
    parameters:
      global_vtask_size: 2
    sink_jobs:
      - next

  next:
    base_image: hub.cstcloud.cn/scalebox/agent

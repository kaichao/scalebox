version: '1.0.0'

label: Global Definition Cluster inline-cluster

specs:
  inline-vm-00:
    # CPU cores
    num_cores: 4
    # Memory(GB)
    mem_gb: 16.0
    # Disk(GB)
    disk: 200.0

clusters:
  inline:
    parameters:
      base_dir: /gfs
      base_data_dir: /gfs/mydata
      uname: root
    comment: inline-cluster
    hosts:
      h0:
        label: head node
        ip_addr: 10.0.6.100
        role: head
        comment: CentOS 8
      n-00:
        ip_addr: 10.0.6.101
      n-01:
        ip_addr: 10.0.6.102
      n-10:
        ip_addr: 10.0.6.103
      n-11:
        ip_addr: 10.0.6.104

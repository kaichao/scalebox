name: app-primes-g${NUM_GROUPS}-postgres
label: Prototype for Distributed Primes Calculation
cluster: ${CLUSTER}
parameters:
  main_router: mr-module

modules:
  my-module:
    label: calc primes
    base_image: app-primes/calc:postgres
    slots:
      - ${CALC_NODE}:${NUM_PARALLEL}
    paths:
      - /var/run/docker.sock:/var/run/docker.sock

  mr-module:
    label: Main router
    base_image: hub.cstcloud.cn/scalebox/agent:latest
    arguments:
      code_path: ${PWD}/mr-code
      slot_options: slot_on_head
    environments:
      - NUM_GROUPS=${NUM_GROUPS}
